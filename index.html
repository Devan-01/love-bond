<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Eternal Bond</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0106; 
            overflow: hidden;
            font-family: 'Georgia', serif;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* 3D Canvas Viewport */
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* NEW: Front Title Welcome Screen Box */
        #welcome-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0106;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .welcome-card {
            background: rgba(255, 240, 243, 0.95);
            border: 5px double #ff4d6d;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.4);
        }

        .welcome-card h2 {
            color: #590d22;
            font-family: 'Times New Roman', serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .welcome-card p {
            color: #ff4d6d;
            font-style: italic;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .welcome-card input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ff4d6d;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            color: #590d22;
            background: #fff;
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
        }

        .welcome-card button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            transition: transform 0.2s;
        }

        .welcome-card button:active {
            transform: scale(0.95);
        }

        /* Floating Overlay Card inside the project */
        .overlay-content {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 240, 243, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 3px double #ff4d6d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.3);
            opacity: 0; /* Hidden initially until unlocked */
            transition: opacity 1s ease 0.5s;
            pointer-events: none;
        }

        /* Show the main content after entering name */
        body.unlocked .overlay-content {
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            font-size: 1.5rem;
            color: #590d22;
            font-family: 'Times New Roman', serif;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.85rem;
            font-style: italic;
            color: #ff4d6d;
            margin-bottom: 12px;
        }

        /* Dynamic Name Display Target */
        .names {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff4d6d;
            margin: 8px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .instruction {
            font-size: 0.75rem;
            color: #c7923e;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 6px;
            padding: 8px;
            border: 1px dashed #ff4d6d;
        }

        #timer {
            font-size: 1.1rem;
            font-weight: bold;
            color: #590d22;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Front Entrance Screen -->
    <div id="welcome-box">
        <div class="welcome-card">
            <h2>Welcome, Beautiful ✨</h2>
            <p>Please enter your name to unlock your card:</p>
            <input type="text" id="nameInput" placeholder="Your Name Here..." autocomplete="off">
            <button onclick="unlockProject()">Enter</button>
        </div>
    </div>

    <!-- 3D Viewport -->
    <canvas id="canvas3d"></canvas>

    <!-- Main Project Content Interface -->
    <div class="overlay-content">
        <h1>CERTIFICATE OF LOVE</h1>
        <div class="subtitle">An Unbreakable 3D Eternal Bond</div>
        
        <div class="instruction">✨ Touch & Swipe to Spin Our Memories ✨</div>

        <!-- The name changes here dynamically based on what she types -->
        <div class="names" id="dynamicName">You & Someone Special</div>
        
        <div class="counter-box">
            <div id="timer">Loading our beautiful time...</div>
        </div>
    </div>

    <!-- External Script Modules -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // INPUT CONTROLLER LOGIC
        function unlockProject() {
            const inputField = document.getElementById('nameInput');
            const enteredName = inputField.value.trim();
            
            // Default back to Malavika if she leaves it empty
            const finalName = enteredName !== "" ? enteredName : "Malavika";
            
            // Inject her name right into the certificate layout
            document.getElementById('dynamicName').innerHTML = You & ${finalName};
            
            // Fade out the entry screen box smoothly
            const welcomeBox = document.getElementById('welcome-box');
            welcomeBox.style.opacity = '0';
            welcomeBox.style.visibility = 'hidden';
            
            // Activate the overlay animation fade-in trigger
            document.body.classList.add('unlocked');
        }

        // Add 'Enter' key support inside text field box
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                unlockProject();
            }
        });

        // RELATIONSHIP COUNTER SETUP
        const anniversaryDate = new Date(2025, 9, 25, 0, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const difference = now - anniversaryDate;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML = 
                ${days}d ${hours}h ${minutes}m ${seconds}s;
        }
        updateTimer();
        setInterval(updateTimer, 1000);

        // --- THREE.JS 3D ENGINE RENDERING PIPELINE ---
        const canvas = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3.5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const textureLoader = new THREE.TextureLoader();
        textureLoader.crossOrigin = "Anonymous"; 
        
        // Directly mapped to your hosted image asset URL
        const yourPhotoTexture = textureLoader.load('https://i.ibb.co/kgNSGPzv/1000006579.jpg');

        const cubeGeometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
        const cubeMaterial = new THREE.MeshStandardMaterial({
            map: yourPhotoTexture,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide
        });

        const memoryCube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        scene.add(memoryCube);

        // Particle background stars creation logic
        const particleCount = 150;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);

        for(let i=0; i<particleCount*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 10;  
            positions[i+1] = (Math.random() - 0.5) * 10;
            positions[i+2] = (Math.random() - 0.5) * 10;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const pCanvas = document.createElement('canvas');
        pCanvas.width = 16; pCanvas.height = 16;
        const pCtx = pCanvas.getContext('2d');
        let gradient = pCtx.createRadialGradient(8, 8, 0, 8, 8, 8);
        gradient.addColorStop(0, 'rgba(255, 77, 109, 1)');
        gradient.addColorStop(1, 'rgba(255, 77, 109, 0)');
        pCtx.fillStyle = gradient; pCtx.fillRect(0, 0, 16, 16);
        const pTexture = new THREE.CanvasTexture(pCanvas);

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.12,
            map: pTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const starField = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(starField);

        // Light Rigging Setup Matrix
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xff4d6d, 2, 10);
        pointLight1.position.set(2, 3, 2);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xc7923e, 1.5, 10);
        pointLight2.position.set(-2, -3, 2);
        scene.add(pointLight2);

        // MOBILE INTERACTIVE EVENT DRAG OVERRIDES
        let isDragging = false;
        let previousTouchX = 0;
        let previousTouchY = 0;

        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - previousTouchX;
            const deltaY = e.touches[0].clientY - previousTouchY;

            memoryCube.rotation.y += deltaX * 0.01;
            memoryCube.rotation.x += deltaY * 0.01;

            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', () => { isDragging = false; });

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousTouchX = e.clientX; previousTouchY = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if(!isDragging) return;
            const deltaX = e.clientX - previousTouchX;
            const deltaY = e.clientY - previousTouchY;
            memoryCube.rotation.y += deltaX * 0.007;
            memoryCube.rotation.x += deltaY * 0.007;
            previousTouchX = e.clientX; previousTouchY = e.clientY;
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ANIMATION RUNTIME SYSTEM TICK
        const clock = new THREE.Clock();

        function tick() {
            const elapsedTime = clock.getElapsedTime();

            if (!isDragging) {
                memoryCube.rotation.y += 0.005;
                memoryCube.rotation.x += 0.003;
            }

            starField.rotation.y = elapsedTime * 0.03;
            starField.rotation.x = elapsedTime * 0.01;

            renderer.render(scene, camera);
            window.requestAnimationFrame(tick);
        }

        tick();
    </script>
</body>
</html>
